name: Build and Deploy .NET App

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-job:
    name: "build job"
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 9.x

      
        
    
