name: Build and Deploy .NET App

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-job:
    name: "build job"
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 9.x
      
      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Publish with dotnet
        run: |
          echo "::group::Before Publishing the app"
          ls ${{ env.DOTNET_ROOT }}
          echo "::endgroup::"
    
          dotnet publish --configuration Release --property:PublishDir="${{ env.DOTNET_ROOT }}/publish"
    
          echo "::group::After Publishing the app"
          ls ${{ env.DOTNET_ROOT }}
          echo "::endgroup::"
