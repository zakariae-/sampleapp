name: Build and Deploy .NET App

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-job:
    name: "build job"
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 9.x
      
      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Publish with dotnet
        run: dotnet publish --configuration Release --property:PublishDir="${{ env.DOTNET_ROOT }}/publish"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: .sample-app
          path: ${{ env.DOTNET_ROOT }}/publish

  deploy-job:
    name: "deploy job"
    runs-on: ubuntu-latest
    needs: build-job
    env:
      package-name: .sample-app
      app-name: sample-app
      deployment-slot: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ env.package-name }}

      - name: Secret Information
        run: |
          echo "Value secret matches: ${{ secrets.AZURE_PUBLISH_PROFILE == 'Placeholder'}}"
          
      - name: Print Name of Azure Web App to Deploy and Deployment Slot 
        run: |
          echo "Azure Web App Name: ${{ env.app-name }} and Deployment Slot: ${{ env.deployment-slot }}"
        
      - name: List files in root directory
        run: ls -la

